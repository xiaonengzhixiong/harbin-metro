<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>哈尔滨地铁动态运行图</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <div class="canvas-container">
            <canvas id="metroCanvas"></canvas>
        </div>
        <div class="controls-panel">
            <div class="big-time" id="bigTimeDisplay">05:30:00</div>
            <div class="legend">
                <div class="legend-item">
                    <span class="color-box" style="background: #C8102E;"></span>
                    <span class="line-name">1号线</span>
                    <span class="train-count" id="trainCountLine1">0</span>
                </div>
                <div class="legend-item">
                    <span class="color-box" style="background: #00AB59;"></span>
                    <span class="line-name">2号线</span>
                    <span class="train-count" id="trainCountLine2">0</span>
                </div>
                <div class="legend-item">
                    <span class="color-box" style="background: #FFC72C;"></span>
                    <span class="line-name">3号线</span>
                    <span class="train-count" id="trainCountLine3">0</span>
                </div>
                <div class="total-count">
                    上线总数: <span id="totalTrainCount">0</span> 列
                </div>
            </div>
            <div class="control-buttons">
                <button id="playPauseBtn">⏸ 暂停</button>
            </div>

            <!-- 时间控制区域 -->
            <div class="slider-group">
                <div class="slider-header">
                    <span class="slider-label">时间</span>
                </div>
                <input type="range" id="timeSlider" class="slider" min="0" max="86400" step="60" value="0">
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <span class="slider-label">速度</span>
                    <span class="slider-value" id="speedDisplay">30x</span>
                </div>
                <input type="range" id="speedSlider" class="slider" min="0" max="20" step="1" value="3">
            </div>

            <div id="tooltip" class="tooltip" style="display: none;"></div>

            <div class="logo-container">
                <img src="哈尔滨地铁.png" alt="哈尔滨地铁" class="metro-logo">
                <a href="#" id="docLink" class="doc-link">使用说明</a>
            </div>
        </div>
    </div>

    <!-- 模态框（说明文档弹窗） -->
    <div id="docModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>哈尔滨地铁运营可视化说明</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <!-- 动态填充内容 -->
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
